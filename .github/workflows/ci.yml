name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run smoke tests
        run: uv run pytest tests/ -v

      - name: Job summary
        if: always()
        run: |
          echo "### CI smoke test" >> "$GITHUB_STEP_SUMMARY"
          echo "Dataset/model construction verified on synthetic data — full training run requires the local MLflow+Postgres stack and is not part of CI." >> "$GITHUB_STEP_SUMMARY"
