program: sweeps/train_sweep.py
method: bayes
metric:
  name: val_mae
  goal: minimize
parameters:
  backbone:
    values: ["mobilenet_v2", "resnet18"]
  learning_rate:
    min: 0.00005
    max: 0.005
  batch_size:
    values: [16, 32, 64]
  unfreeze_layers:
    values: [0, 2, 4, -1]  # frozen, partial (2 and 4 blocks), full fine-tune
  dropout:
    min: 0.1
    max: 0.5
