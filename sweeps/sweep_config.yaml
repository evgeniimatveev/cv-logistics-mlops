program: src/model_training/train_sweep.py
method: bayes
metric:
  name: val_mae
  goal: minimize
parameters:
  backbone:
    values: ["mobilenet_v2", "resnet18"]
  learning_rate:
    min: 0.00005
    max: 0.005
  batch_size:
    values: [16, 32, 64]
  freeze_backbone:
    values: [true, false]
  dropout:
    min: 0.1
    max: 0.5
